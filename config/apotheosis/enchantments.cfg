# Apotheosis Enchantment Information

# This file contains configurable data for each enchantment.
# The names of each category correspond to the registry names of every loaded enchantment.

#! =========================
#! ENCHANTMENT BALANCE NOTES
#! =========================
#
# Każda sekcja odpowiada jednemu enchantowi po registry name, np:
# "minecraft:sharpness" albo "apothic_enchanting:chainsaw".
#
#
#* S:"Min Power Function"
#* S:"Max Power Function"
#   Zakres enchanting power, w którym enchant może wejść do puli losowania.
#!   To NIE jest procentowa szansa ani rarity.
#   To jest bramka: jeśli finalny power stołu nie mieści się między Min i Max, enchant odpada.
#
#   Zmienna x = level enchantu.
#   Dla enchantu z jednym levelem, np. Chainsaw, x zawsze wynosi 1.
#
# ===================================
#* Przykłady Rarity checkpointów:
#  Od początku do końca
#   S:"Min Power Function"=1
#   S:"Max Power Function"=300
#
#   Early-Mid (Common):
#   S:"Min Power Function"=1
#   S:"Max Power Function"=55
#
#  Mid-Late (Uncommon):
#   S:"Min Power Function"=40
#   S:"Max Power Function"=120
#
# Powyższe przykłady są dla enchantów jedno levelowych, niżej znajdziecie przykłady dla wielo levelowych.
#
#  Multi-level, rosnąco rzadniejący:
#   S:"Min Power Function"=45 + x * x * 12
#   S:"Max Power Function"=95 + x * x * 12
#
#   Przykład:
#     level 1 -> 57-107
#     level 2 -> 93-143
#     level 3 -> 153-203
#
#   Dobre, gdy niski level ma być dostępny, a wysokie levele mają być mocno rare.
#
#! Tabelka rarity
#   Common trash:
#     Min = 1
#     Max = 120
#     Prawie zawsze w puli, od early do late.
#
#   Common late-ish:
#     Min = 40
#     Max = 120
#     Nie od razu, ale potem bardzo często.
#
#   Uncommon:
#     Min = 60
#     Max = 120
#     Midgame+, dość normalnie dostępny.
#
#   Light rare:
#     Min = 80
#     Max = 130
#     Wymaga sensownego setupu, ale bez dramatu.
#
#   Rare:
#     Min = 100
#     Max = 145
#     Wchodzi dopiero przy mocnym stole albo dobrym rollu.
#
#   Very rare:
#     Min = 130
#     Max = 155
#     Wymaga wysokiej mocy / Quanty, nie będzie casualowo wpadał.
#
#   Legendary-type:
#     Min = 160
#     Max = 190
#     Tylko mocne setupy z wysoką Quantą, raczej gamble.
#
#   Basically disabled:
#     Min = 10000
#     Max = 10001
#     Praktycznie nieosiągalne z enchanting table.
#
# Uwaga:
#   Eterna, Quanta i Arcana z Apothic/Apotheosis mocno wpływają na finalny wynik.
#   Wysoka Quanta może wyrzucać power dużo powyżej bazowego levelu stołu,
#   a Arcana może zwiększać szanse na rare enchanty.
#   Dlatego po zmianach najlepiej testować w creative na realnym setupie stołu.
#
# =========================


